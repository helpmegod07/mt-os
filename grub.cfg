set default=0
set timeout=5
insmod all_video
insmod gfxterm
terminal_output gfxterm
menuentry "MT-OS Live" {
    linux /boot/vmlinuz boot=live quiet nomodeset
    initrd /boot/initrd.img
}
menuentry "MT-OS Safe Mode" {
    linux /boot/vmlinuz boot=live nomodeset noapic nosplash
    initrd /boot/initrd.img
}
menuentry "MT-OS 800x600 (Very Old)" {
    linux /boot/vmlinuz boot=live vga=771 nomodeset
    initrd /boot/initrd.img
}
